version: '3.8'

services:
  barq-cashier:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
    volumes:
      - ./barq.db:/app/barq.db
    restart: unless-stopped

